baseURL = "https://curriculum.jointheleague.org/Motors/"
title = "Motors Clinic"
theme = "curriculum-hugo-theme"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.goldmark.parser.attribute]
    block = true
    title = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3

[params]
  curriculum_version = "0.20260314.1"
  instructorGuide = true
  github_repo = "https://github.com/league-curriculum/Motors"

