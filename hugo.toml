baseURL = "https://league-curriculum.github.io/Motors/"
title = "Motors Clinic"
theme = "curriculum-hugo-theme"
enableEmoji = true

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.goldmark.parser.attribute]
    block = true
    title = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[params]
  copyright = "The League of Amazing Programmers"
  license = "CC BY-NC 4.0"
  curriculum_version = "0.20260314.3"
  curik_version = "0.20260314.11"
  instructorGuide = true
  github_repo = "https://github.com/league-curriculum/Motors"
